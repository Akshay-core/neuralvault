# FILE: .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        run: |
          flake8 app/ orchestration/ security/ plugins/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          SQLITE_DB_PATH: /tmp/test_brain.db
          OLLAMA_URL: http://localhost:11434  # will fail gracefully in tests